      .title { font: 620 34px "Segoe UI", "Arial", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 22px "Segoe UI", "Arial", sans-serif; fill: #0f172a; }
      .label { font: 600 20px "Segoe UI", "Arial", sans-serif; fill: #0f172a; }
      .text { font: 450 18px "Segoe UI", "Arial", sans-serif; fill: #1f2937; }
      .small { font: 430 16px "Segoe UI", "Arial", sans-serif; fill: #475569; }
      .txt-slate { fill: #334155; }
      .txt-bp { fill: #1e40af; }
      .txt-indigo { fill: #4f46e5; }
      .txt-run { fill: #0f766e; }
      .txt-async { fill: #c2410c; }
      .txt-core { fill: #166534; }
      .txt-ext { fill: #0369a1; }
      .txt-ext2 { fill: #0284c7; }
      .txt-sink { fill: #be123c; }
      .txt-brown { fill: #9a3412; }
      .txt-fork { fill: #6d28d9; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow-slate); }
      .arrow-soft { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow-slate); }
      .arrow-bp-int { stroke: #1e40af; stroke-width: 1.9; fill: none; marker-end: url(#arrow-bp); }
      .arrow-run-int { stroke: #0f766e; stroke-width: 1.8; fill: none; marker-end: url(#arrow-run); }
      .arrow-async-int { stroke: #c2410c; stroke-width: 1.9; fill: none; marker-end: url(#arrow-async); }
      .arrow-core-int { stroke: #166534; stroke-width: 1.8; fill: none; marker-end: url(#arrow-core); }
      .arrow-inter-dsl-bp { stroke: #1e40af; stroke-width: 2.1; fill: none; marker-end: url(#arrow-bp); }
      .arrow-inter-bp-run { stroke: #4f46e5; stroke-width: 2.1; fill: none; marker-end: url(#arrow-indigo); }
      .arrow-inter-run-async { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow-run); }
      .arrow-inter-async-run { stroke: #c2410c; stroke-width: 2.1; fill: none; marker-end: url(#arrow-async); }
      .arrow-inter-run-core { stroke: #166534; stroke-width: 2; fill: none; marker-end: url(#arrow-core); }
      .arrow-inter-run-ext { stroke: #0369a1; stroke-width: 2; fill: none; marker-end: url(#arrow-ext); }
      .arrow-inter-ext-run { stroke: #0284c7; stroke-width: 2; fill: none; marker-end: url(#arrow-ext); }
      .arrow-inter-run-sink { stroke: #be123c; stroke-width: 2; fill: none; marker-end: url(#arrow-sink); }
      .arrow-inter-sink-fork { stroke: #9a3412; stroke-width: 1.9; fill: none; marker-end: url(#arrow-async); }
      .arrow-inter-fork-run { stroke: #6d28d9; stroke-width: 1.8; fill: none; marker-end: url(#arrow-violet); }
      .arrow-async-dash { stroke: #c2410c; stroke-width: 1.9; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-async); }
      .arrow-seq-user-dsl { stroke: #1e40af; stroke-width: 2.1; fill: none; marker-end: url(#arrow-bp); }
      .arrow-seq-dsl-run { stroke: #4f46e5; stroke-width: 2.1; fill: none; marker-end: url(#arrow-indigo); }
      .arrow-seq-user-run { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow-slate); }
      .arrow-seq-run-exec { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow-run); }
      .arrow-seq-exec-run { stroke: #0284c7; stroke-width: 2; fill: none; marker-end: url(#arrow-ext); }
      .arrow-seq-run-async { stroke: #c2410c; stroke-width: 2.1; fill: none; marker-end: url(#arrow-async); }
      .arrow-seq-async-run { stroke: #c2410c; stroke-width: 2.1; fill: none; marker-end: url(#arrow-async); }
      .arrow-seq-run-sink { stroke: #be123c; stroke-width: 2; fill: none; marker-end: url(#arrow-sink); }
      .divider { stroke: #cbd5e1; stroke-width: 1.6; }
    </style>
    <marker id="arrow-slate" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#334155"/>
    </marker>
    <marker id="arrow-bp" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1e40af"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrow-run" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-async" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-core" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#166534"/>
    </marker>
    <marker id="arrow-ext" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0369a1"/>
    </marker>
    <marker id="arrow-sink" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#be123c"/>
    </marker>
    <marker id="arrow-violet" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1920"/>
  <text class="title" x="64" y="62">flux_foundry Architecture + Runtime Sequence</text>

  <!-- A) Architecture -->
  <rect class="panel" x="40" y="90" width="2320" height="1060"/>
  <text class="subtitle" x="68" y="132">A) Architecture View</text>

  <!-- DSL Layer -->
  <rect class="layer" x="70" y="152" width="2260" height="170"/>
  <text class="label" x="94" y="184">DSL Layer (Public API)</text>

  <rect class="node" x="110" y="206" width="300" height="78"/>
  <text class="text" x="136" y="252">make_blueprint()</text>

  <rect class="node" x="440" y="206" width="1840" height="78"/>
  <text class="text" x="468" y="238">operator chain:</text>
  <text class="text" x="468" y="262">transform / then / on_error / catch_exception / via / await / await_when_all / await_when_any / end</text>

  <path class="arrow" d="M410 245 L440 245"/>

  <!-- Internal Layer -->
  <rect class="layer-impl" x="70" y="344" width="2260" height="640"/>
  <text class="label" x="94" y="376">Internal Implementation Layer (4 modules)</text>

  <!-- Module 3 (swapped to top-left): Async/Cancel -->
  <rect class="module-async" x="100" y="394" width="1060" height="250"/>
  <text class="label" x="122" y="426">Module 2: Async / Cancel Control</text>

  <rect class="node-async" x="120" y="442" width="500" height="84"/>
  <text class="text" x="140" y="476">awaitable_factory / aggregator_awaitable_factory</text>

  <rect class="node-async" x="640" y="442" width="500" height="84"/>
  <text class="text" x="660" y="476">awaitable_base / fast_awaitable_base</text>
  <text class="small" x="660" y="498">access_delegate: submit_async / resume</text>

  <rect class="node-async" x="120" y="540" width="500" height="84"/>
  <text class="text" x="140" y="574">flow_controller state machine</text>
  <text class="small" x="140" y="596">normal runner: cancel handler registration</text>
  <text class="small" x="140" y="616">CAS state machine: idle -> waiting -> done</text>

  <rect class="node-async" x="640" y="540" width="500" height="84"/>
  <text class="text" x="660" y="574">when_all / when_any awaitables</text>
  <text class="small" x="660" y="596">launch sub-runners + merge/winner</text>

  <path class="arrow-async-int" d="M620 484 L640 484"/>
  <path class="arrow-async-int" d="M890 540 L890 526"/>
  <path class="arrow-async-dash" d="M620 582 L760 526"/>

  <!-- Module 1 (swapped to top-right): BP Builder -->
  <rect class="module-bp" x="1210" y="394" width="1060" height="250"/>
  <text class="label" x="1232" y="426">Module 1: BP Builder / Normalizer</text>

  <rect class="node-bp" x="1230" y="442" width="500" height="84"/>
  <text class="text" x="1250" y="476">node wrappers: calc / via / async / end</text>

  <rect class="node-bp" x="1750" y="442" width="500" height="84"/>
  <text class="text" x="1770" y="476">build rules:</text>
  <text class="small" x="1770" y="498">calc+calc fusion, via+via newest, async+via forbidden, end terminal</text>

  <rect class="node-bp" x="1230" y="540" width="1020" height="84"/>
  <text class="text" x="1250" y="574">normalized blueprint: flat_storage + node tags, end at index 0</text>

  <path class="arrow-bp-int" d="M1480 526 L1480 540"/>
  <path class="arrow-bp-int" d="M2000 526 L2000 540"/>

  <!-- Module 2 (swapped to bottom-left): Runner -->
  <rect class="module-run" x="100" y="664" width="1060" height="290"/>
  <text class="label" x="122" y="696">Module 3: Runner Engine</text>

  <rect class="node-run" x="120" y="712" width="320" height="84"/>
  <text class="text" x="140" y="746">flow_runner</text>
  <text class="small" x="140" y="768">normal path (cancel-aware)</text>

  <rect class="node-run" x="460" y="712" width="320" height="84"/>
  <text class="text" x="480" y="746">flow_fast_runner</text>
  <text class="small" x="480" y="768">fast path (no controller)</text>

  <rect class="node-run" x="800" y="712" width="340" height="84"/>
  <text class="text" x="820" y="746">shared execution core</text>
  <text class="small" x="820" y="768">ipc(N-1) + node_tag dispatch</text>

  <rect class="node-run" x="120" y="814" width="1020" height="120"/>
  <text class="text" x="140" y="848">calc inline, via dispatch continuation, async submit/resume continuation, inline-executor fast path (no task_wrapper hop)</text>

  <path class="arrow-run-int" d="M280 796 L280 814"/>
  <path class="arrow-run-int" d="M620 796 L620 814"/>
  <path class="arrow-run-int" d="M970 796 L970 814"/>

  <!-- Module 4 (unchanged bottom-right): Runtime Core -->
  <rect class="module-core" x="1210" y="664" width="1060" height="290"/>
  <text class="label" x="1232" y="696">Module 4: Runtime Core</text>

  <rect class="node-core" x="1230" y="712" width="500" height="84"/>
  <text class="text" x="1250" y="746">task_wrapper + callable_wrapper</text>
  <text class="small" x="1250" y="768">continuation transport (type-erasure + SBO)</text>

  <rect class="node-core" x="1750" y="712" width="500" height="84"/>
  <text class="text" x="1770" y="746">result_t / lite_ptr / flat_storage</text>
  <text class="small" x="1770" y="768">typed payload and storage model</text>

  <rect class="node-core" x="1230" y="814" width="1020" height="120"/>
  <text class="text" x="1250" y="848">pooling allocator + queue/static_stack primitives, amortized non-alloc hot path</text>

  <path class="arrow-core-int" d="M1480 796 L1480 814"/>
  <path class="arrow-core-int" d="M2000 796 L2000 814"/>

  <!-- External -->
  <rect class="layer-ext" x="70" y="1000" width="2260" height="130"/>
  <text class="label" x="94" y="1030">External Integration (attach-only design: no event loop ownership, plug into existing executors)</text>

  <rect class="node-ext" x="110" y="1038" width="620" height="72"/>
  <text class="text" x="136" y="1068">optional fork template: flow/flow_fork_receiver_tmp.h</text>
  <text class="small" x="136" y="1090">fork_receiver&lt;Derived, FromBP, To...&gt; + forward(copy result_t)</text>

  <rect class="node-ext" x="760" y="1038" width="760" height="72"/>
  <text class="text" x="786" y="1082">external executor: simple_executor / gsource_executor / custom executor</text>

  <rect class="node-ext" x="1560" y="1038" width="720" height="72"/>
  <text class="text" x="1586" y="1082">result sink: receiver.emplace(result_t(T, E))</text>

  <!-- Cross-module arrows (reduced set) -->
  <path class="arrow-inter-dsl-bp" d="M1740 320 L1740 390"/>
  <text class="small txt-bp" x="1600" y="340">operator normalization to blueprint nodes</text>

  <path class="arrow-inter-bp-run" d="M1220 645 L1155 665"/>
  <text class="small txt-indigo" x="1180" y="661">blueprint consumed by runner engines</text>

  <path class="arrow-inter-run-async" d="M790 814 L790 526"/>
  <text class="small txt-run" x="675" y="660">await/aggregate factory path</text>

  <path class="arrow-inter-async-run" d="M970 526 L970 712"/>
  <text class="small txt-async" x="904" y="660">resume(result_t) back to runner</text>

  <path class="arrow-inter-run-core" d="M1140 754 L1230 754"/>
  <text class="small txt-core" x="1144" y="735">runner uses</text>
  <text class="small txt-core" x="1144" y="750">runtime core</text>

  <path class="arrow-inter-run-ext" d="M930 934 L930 1038"/>
  <path class="arrow-inter-ext-run" d="M1010 1038 L1010 934"/>
  <text class="small txt-ext" x="850" y="980">via/non-inline continuation submit + re-enter</text>

  <path class="arrow-inter-run-sink" d="M1040 934 L1920 1038"/>
  <text class="small txt-sink" x="1300" y="980">final result delivery</text>

  <path class="arrow-inter-sink-fork" d="M1560 1120 L730 1120"/>
  <text class="small txt-brown" x="952" y="1110">optional fan-out receiver path</text>

  <path class="arrow-inter-fork-run" d="M420 1038 L420 934"/>
  <text class="small txt-fork" x="300" y="980">start downstream runner(s), optional join bp</text>

  <!-- B) Sequence -->
  <rect class="panel" x="40" y="1180" width="2320" height="700"/>
  <text class="subtitle" x="68" y="1222">B) Runtime Sequence View</text>
  <line class="divider" x1="40" y1="1242" x2="2360" y2="1242"/>

  <rect class="seq-lane-user" x="90" y="1260" width="300" height="590"/>
  <rect class="seq-lane-bp" x="390" y="1260" width="360" height="590"/>
  <rect class="seq-lane-run" x="750" y="1260" width="500" height="590"/>
  <rect class="seq-lane-async" x="1250" y="1260" width="430" height="590"/>
  <rect class="seq-lane-exec" x="1680" y="1260" width="360" height="590"/>
  <rect class="seq-lane-sink" x="2040" y="1260" width="280" height="590"/>

  <text class="label" x="170" y="1294">User Code</text>
  <text class="label" x="470" y="1294">DSL / BP Builder</text>
  <text class="label" x="940" y="1294">Runner</text>
  <text class="label" x="1320" y="1294">Factory + Awaitable</text>
  <text class="label" x="1772" y="1294">Executor</text>
  <text class="label" x="2108" y="1294">Receiver</text>

  <path class="arrow-seq-user-dsl" d="M240 1330 L570 1330"/>
  <text class="small txt-bp" x="258" y="1318">1) build pipeline by operator chain</text>

  <path class="arrow-seq-dsl-run" d="M570 1390 L1000 1390"/>
  <text class="small txt-indigo" x="598" y="1378">2) make_runner(bp, receiver) / make_fast_runner(...)</text>

  <path class="arrow-seq-user-run" d="M240 1450 L1000 1450"/>
  <text class="small txt-slate" x="268" y="1438">3) operator()(input...)</text>

  <rect class="seq-note" x="790" y="1480" width="420" height="54"/>
  <text class="small" x="810" y="1512">4) ipc(N-1) + node_tag dispatch</text>

  <path class="arrow-seq-run-exec" d="M1000 1580 L1860 1580"/>
  <text class="small txt-run" x="1030" y="1568">5) via/non-inline: dispatch(task_wrapper)</text>

  <path class="arrow-seq-exec-run" d="M1860 1630 L1000 1630"/>
  <text class="small txt-ext2" x="1350" y="1618">6) executor runs continuation and re-enters runner</text>

  <path class="arrow-seq-run-async" d="M1000 1690 L1465 1690"/>
  <text class="small txt-async" x="1026" y="1678">7) factory(input result_t) -> access_delegate</text>

  <path class="arrow-seq-run-async" d="M1000 1740 L1465 1740"/>
  <text class="small txt-async" x="1026" y="1728">8) submit_async()</text>

  <path class="arrow-seq-async-run" d="M1465 1790 L1000 1790"/>
  <text class="small txt-async" x="1110" y="1778">9) resume(result_t) exactly once</text>

  <path class="arrow-seq-run-sink" d="M1000 1840 L2180 1840"/>
  <text class="small txt-sink" x="1470" y="1828">10) end output -> receiver.emplace(...)</text>

  <rect class="seq-opt" x="110" y="1660" width="1540" height="180"/>
  <text class="small" x="132" y="1686">optional cancel (normal runner): user triggers flow_controller.cancel() -> cancel handler -> resume(cancel_error)</text>
</svg>
