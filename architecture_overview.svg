      .node-run { fill: #ffffff; stroke: #0f766e; stroke-width: 1.3; rx: 8; ry: 8; }
      .node-async { fill: #ffffff; stroke: #c2410c; stroke-width: 1.3; rx: 8; ry: 8; }
      .node-core { fill: #ffffff; stroke: #166534; stroke-width: 1.2; rx: 8; ry: 8; }
      .node-ext { fill: #ffffff; stroke: #0369a1; stroke-width: 1.2; rx: 8; ry: 8; }
      .seq-lane { fill: #ffffff; stroke: #64748b; stroke-width: 1.3; }
      .seq-lane-user { fill: #f8fafc; stroke: #64748b; stroke-width: 1.3; }
      .seq-lane-bp { fill: #e0e7ff; stroke: #1e40af; stroke-width: 1.3; }
      .seq-lane-run { fill: #ecfeff; stroke: #0f766e; stroke-width: 1.3; }
      .seq-lane-async { fill: #ffedd5; stroke: #c2410c; stroke-width: 1.3; }
