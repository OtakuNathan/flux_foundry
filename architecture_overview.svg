      .module-async { fill: #ffedd5; stroke: #c2410c; stroke-width: 2; rx: 10; ry: 10; }
      .module-core { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 10; ry: 10; }
      .node { fill: #ffffff; stroke: #475569; stroke-width: 1.3; rx: 8; ry: 8; }
